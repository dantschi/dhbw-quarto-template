name: Publish Quarto Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      # Mermaid → PNG im Headless-Chrome (PDF-Handout)
      QUARTO_CHROMIUM_HEADLESS_MODE: new
      # TinyTeX-Installation / GitHub-API
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          # LaTeX für --profile handout --to pdf
          tinytex: true

      - name: Install Chromium (Mermaid → PNG)
        run: |
          quarto install chromium --no-prompt \
            || quarto install chrome-headless-shell --no-prompt

      - name: Install system fonts and rsvg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-liberation \
            fontconfig \
            librsvg2-bin
          # Arial ist in _quarto-handout.yml gesetzt — auf Ubuntu auf Liberation Sans mappen
          mkdir -p "${HOME}/.config/fontconfig/conf.d"
          cat > "${HOME}/.config/fontconfig/conf.d/99-arial-alias.conf" <<'EOF'
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
          <fontconfig>
            <alias binding="same">
              <family>Arial</family>
              <prefer>
                <family>Liberation Sans</family>
              </prefer>
            </alias>
            <alias binding="same">
              <family>Consolas</family>
              <prefer>
                <family>Liberation Mono</family>
              </prefer>
            </alias>
          </fontconfig>
          EOF
          fc-cache -f

      - name: Install LaTeX packages for handout
        run: |
          tlmgr update --self || true
          tlmgr install \
            tcolorbox \
            needspace \
            sectsty \
            xcolor \
            pgf \
            environ \
            trimspaces \
            pdfcol \
            fancyvrb \
            framed \
            booktabs \
            setspace \
            float \
            mdwtools \
            caption \
            unicode-math \
            fontspec \
            lm \
            lm-math \
            tex-gyre \
            || true

      - name: Render website
        uses: quarto-dev/quarto-actions/render@v2

      - name: Render PDF handout
        run: |
          quarto render vorlesungen/01_kickoff.qmd --profile handout --to pdf

      - name: Attach handout PDF to website
        run: |
          mkdir -p _site/vorlesungen
          cp _handout/vorlesungen/01_kickoff.pdf \
             _site/vorlesungen/01_kickoff-handout.pdf
          ls -la _site/vorlesungen/*.pdf

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          # Website + Handout-PDF bereits gerendert/kopiert
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

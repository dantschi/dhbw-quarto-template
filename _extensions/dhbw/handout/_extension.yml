title: DHBW Folien-Handout
author: DHBW Quarto Template
version: 1.0.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      # Studierende sehen Folie + Notizen (Skript); PDF via Druckansicht (E)
      show-notes: true
      slide-number: true
      chalkboard: false
      preview-links: auto
      center: true
      controls: false
      menu: false
      # Folienfläche 16:9; Notizen erweitern die Druckseite nach unten
      width: 1050
      height: 700
      margin: 0.06
      pdf-max-pages-per-slide: 1
      theme:
        - simple
        - ../../../assets/styles/slides.scss
        - ../../../assets/styles/handout.scss
      logo: ../../../assets/logo-template.svg
      include-in-header:
        - text: |
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

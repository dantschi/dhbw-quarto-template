project:
  type: website

website:
  title: "[Modulname]"
  description: "Vorlesung [Modulname] ([Modulkürzel]) an der DHBW Stuttgart"
  site-url: https://[GITHUB-USER].github.io/[REPO]/
  favicon: assets/logo-template.svg
  sidebar:
    style: floating
    contents:
      - href: index.qmd
        text: "Startseite"
      - section: "Vorlesungen"
        contents: vorlesungen/*
  page-footer:
    left: "[Modulkürzel] · DHBW Stuttgart"
    right: "CC BY 4.0"

format:
  # ---------------------------------------------------------------------------
  # Website (HTML) — Startseite & Inhaltsseiten
  # Pfade relativ (ohne führendes /), sonst bricht CSS auf GitHub Pages.
  # ---------------------------------------------------------------------------
  html:
    theme:
      - cosmo
      - assets/styles/custom.scss
    toc: true
    mainfont: Inter
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  # ---------------------------------------------------------------------------
  # Reveal.js — Vorlesungsfolien (Vortrag)
  # Speaker Notes nur in der Speaker View (Taste S) — nicht auf der Leinwand.
  # ---------------------------------------------------------------------------
  revealjs:
    theme:
      - simple
      - assets/styles/slides.scss
    logo: assets/logo-template.svg
    slide-number: true
    chalkboard: false
    preview-links: auto
    center: false
    # r-stretch kollidiert mit SVG-Schaltungen (Höhe oft 0 → unsichtbar)
    auto-stretch: false
    width: 1280
    height: 720
    margin: 0.08
    show-notes: false
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    include-after-body:
      - assets/scripts/mermaid-fit.html

  # ---------------------------------------------------------------------------
  # PDF-Artikel (optional, für reine Textskripte — nicht Folien-Handout)
  # Folien-Handout: siehe Profil / Format handout (Druckansicht E bzw. --profile handout)
  # ---------------------------------------------------------------------------
  pdf:
    documentclass: article
    papersize: a4
    geometry:
      - margin=3cm
    # TeX Gyre — portabel mit TinyTeX (CI/Linux); Arial/Consolas sind dort oft nicht installiert
    mainfont: TeX Gyre Heros
    sansfont: TeX Gyre Heros
    monofont: TeX Gyre Cursor
    fontsize: 11pt
    linestretch: 1.25
    colorlinks: true
    linkcolor: dhbwred
    urlcolor: dhbwred
    citecolor: dhbwred
    toc: true
    numbersections: true
    keep-tex: false
    include-in-header:
      - text: |
          \usepackage{xcolor}
          \definecolor{dhbwred}{HTML}{E2001A}

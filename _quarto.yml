project:
  type: website

website:
  title: "[Modulname]"
  description: "Vorlesung [Modulname] ([Modulkürzel]) an der DHBW Stuttgart"
  site-url: https://[GITHUB-USER].github.io/[REPO]/
  favicon: assets/dhbw_logo.svg
  sidebar:
    style: floating
    contents:
      - href: index.qmd
        text: "Startseite"
      - section: "Vorlesungen"
        contents: vorlesungen/*
  page-footer:
    left: "[Modulkürzel] · DHBW Stuttgart"
    right: "CC BY 4.0"

format:
  # ---------------------------------------------------------------------------
  # Website (HTML) — Startseite & Inhaltsseiten
  # Pfade relativ (ohne führendes /), sonst bricht CSS auf GitHub Pages.
  # ---------------------------------------------------------------------------
  html:
    theme:
      - cosmo
      - assets/styles/custom.scss
    toc: true
    mainfont: Inter
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  # ---------------------------------------------------------------------------
  # Reveal.js — Vorlesungsfolien (Vortrag)
  # Speaker Notes nur in der Speaker View (Taste S) — nicht auf der Leinwand.
  # ---------------------------------------------------------------------------
  revealjs:
    theme:
      - simple
      - assets/styles/slides.scss
    logo: assets/dhbw_logo.svg
    slide-number: true
    chalkboard: false
    preview-links: auto
    center: true
    show-notes: false
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  # ---------------------------------------------------------------------------
  # PDF-Artikel (optional, für reine Textskripte — nicht Folien-Handout)
  # Folien-Handout: format handout-revealjs → Druckansicht (E) → A4 Hochformat
  # ---------------------------------------------------------------------------
  pdf:
    documentclass: article
    papersize: a4
    geometry:
      - margin=2.2cm
    mainfont: Arial
    sansfont: Arial
    monofont: Consolas
    fontsize: 11pt
    linestretch: 1.25
    colorlinks: true
    linkcolor: "E2001A"
    urlcolor: "E2001A"
    citecolor: "E2001A"
    toc: true
    numbersections: true
    keep-tex: false

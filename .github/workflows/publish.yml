name: Publish Quarto Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Render website
        uses: quarto-dev/quarto-actions/render@v2

      # --- PDF-Handouts: Fehler sind Warnungen; Website wird trotzdem veröffentlicht ---
      - name: Install Chrome Headless Shell (Mermaid → PNG)
        timeout-minutes: 10
        run: quarto install chrome-headless-shell --no-prompt

      - name: Install rsvg (optional diagram conversion)
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin

      # Optional/vorbefüllt; Quarto kann fehlende Pakete beim Render oft selbst nachziehen.
      # || true: CTAN-/Spiegel-Ausfälle sollen den Job nicht hart abbrechen.
      - name: Install LaTeX packages for handout
        timeout-minutes: 10
        run: |
          tlmgr update --self || true
          tlmgr install \
            tcolorbox needspace sectsty xcolor pgf environ trimspaces \
            pdfcol fancyvrb framed booktabs setspace float mdwtools \
            caption unicode-math fontspec lm lm-math tex-gyre \
            || true

      - name: Render PDF handouts
        id: handout
        timeout-minutes: 25
        run: |
          set -u
          shopt -s nullglob
          files=(vorlesungen/*.qmd)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::Keine .qmd-Dateien in vorlesungen/ — überspringe Handouts."
            echo "handout_ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          failed=0
          for f in "${files[@]}"; do
            echo "::group::Handout: $f"
            if quarto render "$f" --profile handout --to pdf; then
              echo "OK: $f"
            else
              echo "::warning::PDF-Handout fehlgeschlagen: $f"
              failed=1
            fi
            echo "::endgroup::"
          done

          if [ "$failed" -ne 0 ]; then
            echo "handout_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Mindestens ein PDF-Handout ist fehlgeschlagen. Website wird trotzdem veröffentlicht."
          else
            echo "handout_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach handout PDFs to website
        if: always()
        run: |
          set -u
          shopt -s nullglob
          mkdir -p _site/vorlesungen
          pdfs=(_handout/vorlesungen/*.pdf)
          if [ ${#pdfs[@]} -eq 0 ]; then
            echo "Keine Handout-PDFs zum Kopieren."
            exit 0
          fi
          for pdf in "${pdfs[@]}"; do
            base="$(basename "$pdf" .pdf)"
            cp "$pdf" "_site/vorlesungen/${base}-handout.pdf"
            echo "Kopiert: ${base}-handout.pdf"
          done
          ls -la _site/vorlesungen/*-handout.pdf

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

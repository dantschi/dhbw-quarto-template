# =============================================================================
# Profil „handout“ — Studierenden-Skript als PDF (Hochformat)
# Aufruf:
#   quarto render vorlesungen/01_kickoff.qmd --profile handout --to pdf
# Ausgabe:
#   _handout/vorlesungen/01_kickoff.pdf
#
# Optional HTML-Handout:
#   quarto render vorlesungen/01_kickoff.qmd --profile handout --to revealjs
# =============================================================================

project:
  output-dir: _handout

format:
  # ---------------------------------------------------------------------------
  # PDF-Skript: Folienkarte oben, Skriptblock darunter, dunkler Text
  # ---------------------------------------------------------------------------
  pdf:
    documentclass: article
    papersize: a4
    geometry:
      - top=1.8cm
      - bottom=2cm
      - left=2cm
      - right=2cm
    # TeX Gyre (mit TinyTeX) — Arial/Consolas fehlen auf Linux-CI und brechen lualatex
    mainfont: TeX Gyre Heros
    sansfont: TeX Gyre Heros
    monofont: TeX Gyre Cursor
    fontsize: 11pt
    linestretch: 1.25
    toc: false
    numbersections: false
    colorlinks: true
    linkcolor: dhbwred
    urlcolor: dhbwred
    citecolor: dhbwred
    keep-tex: false
    mermaid-format: png
    mermaid:
      theme: base
    filters:
      - filters/mermaid-dhbw-pdf.lua
      - filters/notes-handout.lua
    include-in-header:
      - text: |
          \usepackage{xcolor}
          \definecolor{dhbwred}{HTML}{E2001A}
          \definecolor{softblack}{HTML}{1D1D1F}
          \definecolor{applegray}{HTML}{F5F5F7}
          \definecolor{hairline}{HTML}{E5E5EA}
          \definecolor{mutedgray}{HTML}{86868B}
          \usepackage{needspace}
          \usepackage[most]{tcolorbox}
          % Grafiken: natürliche Größe, nur nach oben begrenzen (kein Stretch auf volle Breite)
          \usepackage{graphicx}
          \usepackage[export]{adjustbox}
          \let\dhbwOldIncludegraphics\includegraphics
          \renewcommand{\includegraphics}[2][]{%
            \dhbwOldIncludegraphics[max width=0.65\linewidth,max height=0.22\textheight,keepaspectratio,center,#1]{#2}%
          }
          \makeatletter
          \def\maxwidth{\ifdim\Gin@nat@width>0.65\linewidth0.65\linewidth\else\Gin@nat@width\fi}
          \def\maxheight{\ifdim\Gin@nat@height>0.22\textheight0.22\textheight\else\Gin@nat@height\fi}
          \makeatother
          % Global lesbarer Fließtext (kein helles Reveal-Grau)
          \AtBeginDocument{%
            \color{softblack}%
            \renewcommand{\normalsize}{\fontsize{11}{14}\selectfont\color{softblack}}%
          }
          \usepackage{sectsty}
          \allsectionsfont{\color{softblack}\bfseries}
          \newtcolorbox{folienblock}[1]{%
            enhanced,
            colback=white,
            colframe=hairline,
            coltext=softblack,
            boxrule=1pt,
            arc=3pt,
            left=10pt,
            right=10pt,
            top=10pt,
            bottom=10pt,
            before skip=8pt,
            after skip=4pt,
            title={#1},
            fonttitle=\bfseries\small\color{dhbwred},
            coltitle=dhbwred,
            colbacktitle=applegray,
            attach title to upper={\par\medskip},
            breakable
          }
          \newtcolorbox{notesblock}{%
            enhanced,
            colback=applegray,
            colframe=applegray,
            coltext=softblack,
            boxrule=0pt,
            borderline west={2.5pt}{0pt}{dhbwred},
            arc=3pt,
            left=10pt,
            right=10pt,
            top=8pt,
            bottom=8pt,
            before skip=2pt,
            after skip=12pt,
            fontupper=\small\color{softblack},
            breakable
          }

  # ---------------------------------------------------------------------------
  # Reveal-HTML-Handout (optional, --to revealjs)
  # ---------------------------------------------------------------------------
  revealjs:
    show-notes: true
    chalkboard: false
    slide-number: true
    center: true
    theme:
      - simple
      - assets/styles/slides.scss
      - assets/styles/handout-print.scss
